<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vertical Scrollable Images</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            overflow-y: scroll;
        }

        .image-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: 100vw;
        }

        .image-container img {
            width: 100vw;
            height: auto;
            display: block;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            width: 100vw;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>

</head>

<body>

<div class="image-container">

    <img src="https://raw.githubusercontent.com/MathEase07/buena/main/buenaventurawork-1.1.png" alt="1">

    <div class="video-container">
        <iframe src="https://drive.google.com/file/d/1U4T8aBjBXAf8frMd-lRyssK5neA26u9u/view?usp=sharing"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    </div>

    <img src="https://raw.githubusercontent.com/MathEase07/buena/main/buenaventurawork-1.2.png" alt="2">

    <img src="https://raw.githubusercontent.com/MathEase07/CPALPICS/main/buenaventurawork-2.png" alt="3">

</div>

</body>
</html>
